<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="DejaVu Sans, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="enc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="dec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="attn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="copy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9a3412"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#881337"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="out" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
    <marker id="arrow-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="780" height="600" fill="none" stroke="#334155" stroke-width="2" rx="8"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">
    Pointer-Generator Network 架构图
  </text>

  <!-- Source Text (Input) -->
  <rect x="300" y="60" width="200" height="36" rx="6" fill="#334155" stroke="#64748b" stroke-width="1.5"/>
  <text x="400" y="84" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">Source Text</text>

  <!-- Arrow: Source → Encoder -->
  <line x1="400" y1="96" x2="400" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Encoder -->
  <rect x="250" y="120" width="300" height="50" rx="8" fill="url(#enc)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="400" y="140" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Bi-directional LSTM Encoder</text>
  <text x="400" y="158" text-anchor="middle" fill="#93c5fd" font-size="10">2-layer BiLSTM, hidden=256×2</text>

  <!-- Arrow: Encoder → Attention (both sides) -->
  <line x1="400" y1="170" x2="400" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Attention Box -->
  <rect x="250" y="200" width="300" height="50" rx="8" fill="url(#attn)" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="400" y="220" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Bahdanau Attention</text>
  <text x="400" y="238" text-anchor="middle" fill="#ddd6fe" font-size="10">Context Vector: h* = Σ a_i · h_i</text>

  <!-- Decoder -->
  <rect x="250" y="280" width="300" height="50" rx="8" fill="url(#dec)" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="400" y="300" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">LSTM Decoder</text>
  <text x="400" y="318" text-anchor="middle" fill="#a7f3d0" font-size="10">Single-layer LSTM, hidden=512</text>

  <!-- Arrow: Attention → Decoder -->
  <line x1="400" y1="250" x2="400" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Coverage Box -->
  <rect x="50" y="240" width="140" height="44" rx="8" fill="url(#cover)" stroke="#fda4af" stroke-width="1.5"/>
  <text x="120" y="260" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Coverage</text>
  <text x="120" y="276" text-anchor="middle" fill="#fecdd3" font-size="9">c^t = Σ a^{t'}</text>

  <!-- Coverage → Attention (dashed) -->
  <line x1="190" y1="262" x2="245" y2="225" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-r)"/>

  <!-- p_gen Box -->
  <rect x="560" y="240" width="160" height="44" rx="8" fill="url(#copy)" stroke="#fdba74" stroke-width="1.5"/>
  <text x="640" y="258" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">p_gen = σ(W·h + b)</text>
  <text x="640" y="274" text-anchor="middle" fill="#fed7aa" font-size="9">Generate vs Copy switch</text>

  <!-- Decoder → p_gen -->
  <line x1="550" y1="305" x2="560" y2="262" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output Distribution -->
  <rect x="250" y="370" width="300" height="50" rx="8" fill="url(#out)" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="400" y="390" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Final Distribution</text>
  <text x="400" y="408" text-anchor="middle" fill="#bae6fd" font-size="10">P(w) = p_gen · P_vocab + (1-p_gen) · Σ a_i</text>

  <!-- Arrow: Decoder → Output -->
  <line x1="400" y1="330" x2="400" y2="370" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: p_gen → Output -->
  <line x1="640" y1="284" x2="555" y2="395" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Coverage → Output (dashed) -->
  <line x1="120" y1="284" x2="245" y2="395" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-r)"/>

  <!-- Generated Summary -->
  <rect x="280" y="460" width="240" height="36" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="400" y="484" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">Generated Summary</text>

  <line x1="400" y1="420" x2="400" y2="460" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="60" y="530" width="680" height="60" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="545" width="14" height="14" rx="3" fill="url(#enc)"/>
  <text x="100" y="557" fill="#94a3b8" font-size="10">Encoder</text>
  <rect x="180" y="545" width="14" height="14" rx="3" fill="url(#dec)"/>
  <text x="200" y="557" fill="#94a3b8" font-size="10">Decoder</text>
  <rect x="280" y="545" width="14" height="14" rx="3" fill="url(#attn)"/>
  <text x="300" y="557" fill="#94a3b8" font-size="10">Attention</text>
  <rect x="390" y="545" width="14" height="14" rx="3" fill="url(#copy)"/>
  <text x="410" y="557" fill="#94a3b8" font-size="10">Pointer (p_gen)</text>
  <rect x="510" y="545" width="14" height="14" rx="3" fill="url(#cover)"/>
  <text x="530" y="557" fill="#94a3b8" font-size="10">Coverage</text>
  <line x1="620" y1="552" x2="660" y2="552" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="668" y="557" fill="#94a3b8" font-size="10">Coverage signal</text>
</svg>
